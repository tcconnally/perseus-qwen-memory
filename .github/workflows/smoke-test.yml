name: Smoke Test

on:
  push:
    branches: [main, ci/smoke-tests]
  pull_request:
    branches: [main]

jobs:
  demo-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Smoke test — imports, MemoryEntry, config validation
        env:
          DASHSCOPE_API_KEY: stub
          MEMORY_BACKEND: engram
        run: |
          python - <<'EOF'
          # Catches "demo crashes on import" — the exact failure that shipped
          # to main when a merge reordered MemoryEntry's dataclass fields.
          import agent.main
          from agent.config import AgentConfig
          from perseus_agent_core.memory import MemoryEntry

          issues = AgentConfig().validate()
          assert issues == [], f"config validation failed: {issues}"

          entry = MemoryEntry(content="smoke", category="fact", project="ci")
          assert entry.id == ""
          print("smoke test OK: imports, config, MemoryEntry")
          EOF
